name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: bash -n install.sh script/build_and_run.sh

      - name: Run Swift tests
        run: swift test
